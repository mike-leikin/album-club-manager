<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer vinyl record -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a"/>

  <!-- Record grooves (subtle rings) -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Center label -->
  <circle cx="50" cy="50" r="20" fill="#dc2626"/>

  <!-- Center hole -->
  <circle cx="50" cy="50" r="8" fill="#1a1a1a"/>

  <!-- Inner label ring -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="#b91c1c" stroke-width="0.5"/>
</svg>
